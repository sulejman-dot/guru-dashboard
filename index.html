<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEOmonitor Knowledge Base</title>
    <meta name="description" content="SEOmonitor Customer Success Knowledge Base — Browse and search Guru cards">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e14;
            --bg-surface: #13161f;
            --bg-card: #1a1e2c;
            --bg-card-hover: #242a3d;
            --bg-input: #1a1e2c;
            --border: #262c40;
            --border-hover: #3d4560;
            --text: #eaecf5;
            --text-secondary: #a0a5bd;
            --text-muted: #5c6180;
            --accent: #7c6cf0;
            --accent-light: #b4a8ff;
            --accent-glow: rgba(124, 108, 240, 0.12);
            --accent-glow-strong: rgba(124, 108, 240, 0.25);
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.1);
            --orange: #fbbf24;
            --orange-bg: rgba(251, 191, 36, 0.1);
            --blue: #60a5fa;
            --blue-bg: rgba(96, 165, 250, 0.1);
            --pink: #f472b6;
            --pink-bg: rgba(244, 114, 182, 0.1);
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── HERO HEADER ─────────────────────────────────────── */
        .hero {
            background: linear-gradient(135deg, #13161f 0%, #1a1226 50%, #13161f 100%);
            border-bottom: 1px solid var(--border);
            padding: 32px 0 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow-strong), transparent 70%);
            pointer-events: none;
        }

        .hero-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 28px;
            position: relative;
            z-index: 1;
        }

        .hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: white;
            box-shadow: 0 4px 20px rgba(124, 108, 240, 0.3);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* ── SEARCH ────────────────────────────────────────── */
        .search-box {
            position: relative;
            max-width: 460px;
            flex: 1;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
        }

        .search-box .shortcut {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .search-results-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            min-height: 20px;
        }

        /* ── STATS ROW ─────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: all 0.25s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .stat-number.purple {
            color: var(--accent-light);
        }

        .stat-number.green {
            color: var(--green);
        }

        .stat-number.orange {
            color: var(--orange);
        }

        .stat-number.blue {
            color: var(--blue);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ── CATEGORY PILLS ────────────────────────────────── */
        .categories-section {
            padding: 0 0 24px;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            padding: 7px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .pill:hover {
            border-color: var(--accent);
            color: var(--text);
            background: var(--accent-glow);
        }

        .pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 12px rgba(124, 108, 240, 0.3);
        }

        .pill .count {
            font-size: 11px;
            opacity: 0.6;
            margin-left: 4px;
        }

        /* ── MAIN CONTENT ──────────────────────────────────── */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 28px 60px;
        }

        /* ── CARD GRID ─────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-category {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .cat-ai {
            background: var(--pink-bg);
            color: var(--pink);
        }

        .cat-billing {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .cat-rank {
            background: var(--blue-bg);
            color: var(--blue);
        }

        .cat-analytics {
            background: var(--green-bg);
            color: var(--green);
        }

        .cat-competition {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .cat-onboarding {
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .cat-forecasting {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
        }

        .cat-integrations {
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
        }

        .cat-content {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
        }

        .cat-reports {
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
        }

        .cat-campaigns {
            background: rgba(34, 211, 238, 0.1);
            color: #22d3ee;
        }

        .cat-data {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }

        .cat-general {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
        }

        .cat-pending {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-preview {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── LOAD MORE ─────────────────────────────────────── */
        .load-more {
            text-align: center;
            padding: 32px;
        }

        .load-more button {
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(124, 108, 240, 0.25);
        }

        .load-more button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 108, 240, 0.35);
        }

        .empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 18px;
            font-weight: 500;
        }

        .empty-hint {
            font-size: 14px;
            margin-top: 8px;
        }

        /* ── MODAL ─────────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 200;
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: flex-start;
            padding: 48px 20px;
            overflow-y: auto;
        }

        .overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            width: 100%;
            max-width: 760px;
            position: relative;
            animation: appear 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 28px 32px 0;
        }

        .modal-cat {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 6px;
            margin-bottom: 14px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            padding-right: 48px;
        }

        .modal-body {
            padding: 24px 32px 32px;
            font-size: 15px;
            line-height: 1.85;
            color: var(--text-secondary);
        }

        .modal-body p {
            margin-bottom: 14px;
        }

        .modal-body p:last-child {
            margin-bottom: 0;
        }

        .modal-body strong,
        .modal-body b {
            color: var(--text);
            font-weight: 600;
        }

        .modal-body ol,
        .modal-body ul {
            padding-left: 24px;
            margin-bottom: 14px;
        }

        .modal-body li {
            margin-bottom: 6px;
        }

        .modal-body a {
            color: var(--accent-light);
            text-decoration: none;
        }

        .modal-body a:hover {
            text-decoration: underline;
        }

        .modal-footer {
            padding: 16px 32px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .modal-footer a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
        }

        .modal-footer a:hover {
            text-decoration: underline;
        }

        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .btn-close:hover {
            background: var(--accent);
            color: white;
        }

        /* ── RESPONSIVE ────────────────────────────────────── */
        @media (max-width: 768px) {
            .hero-top {
                flex-wrap: wrap;
            }

            .search-box {
                max-width: 100%;
                order: 3;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .stat-number {
                font-size: 24px;
            }

            .modal {
                border-radius: 14px;
            }

            .modal-title {
                font-size: 20px;
            }
        }

        /* ── ANIMATIONS ────────────────────────────────────── */
        .card {
            animation: fadeIn 0.4s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="hero-inner">
            <div class="hero-top">
                <div class="logo">
                    <div class="logo-icon">G</div>
                    <h1>SEOmonitor <span>Knowledge Base</span></h1>
                </div>
                <div class="search-box">
                    <span class="icon">🔍</span>
                    <input type="text" id="search" placeholder="Search 631 knowledge cards..." autocomplete="off">
                    <span class="shortcut">/</span>
                </div>
            </div>
            <div class="stats-row" id="stats"></div>
            <div class="categories-section">
                <div class="category-pills" id="pills"></div>
            </div>
            <div class="search-results-info" id="resultsInfo"></div>
        </div>
    </div>

    <div class="main">
        <div class="grid" id="grid"></div>
        <div class="load-more" id="loadMore" style="display:none;">
            <button onclick="showMore()">Show more cards</button>
        </div>
        <div class="empty" id="empty" style="display:none;">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">No cards match your search</div>
            <div class="empty-hint">Try different keywords or clear the filter</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="overlay" id="overlay">
        <div class="modal">
            <button class="btn-close" id="close">✕</button>
            <div class="modal-header">
                <div class="modal-cat" id="mCat"></div>
                <div class="modal-title" id="mTitle"></div>
            </div>
            <div class="modal-body" id="mBody"></div>
            <div class="modal-footer" id="mFoot"></div>
        </div>
    </div>

    <script>
        const CAT_CSS = {
            'AI Features': 'cat-ai', 'Billing & Plans': 'cat-billing', 'Rank Tracking': 'cat-rank',
            'Analytics': 'cat-analytics', 'Competition': 'cat-competition', 'Onboarding': 'cat-onboarding',
            'Forecasting': 'cat-forecasting', 'Integrations': 'cat-integrations', 'Content': 'cat-content',
            'Reports': 'cat-reports', 'Campaigns': 'cat-campaigns', 'Data & Metrics': 'cat-data',
            'General': 'cat-general', 'Pending': 'cat-pending'
        };
        const CAT_EMOJI = {
            'AI Features': '🤖', 'Billing & Plans': '💳', 'Rank Tracking': '📊',
            'Analytics': '📈', 'Competition': '⚔️', 'Onboarding': '🎓',
            'Forecasting': '🔮', 'Integrations': '🔌', 'Content': '✍️',
            'Reports': '📋', 'Campaigns': '🎯', 'Data & Metrics': '📐',
            'General': '📁', 'Pending': '⏳'
        };

        let allCards = [], pendingCards = [], filtered = [], activeCategory = null, perPage = 30;

        async function init() {
            const data = await (await fetch('data.json')).json();
            allCards = data.cards || [];
            pendingCards = data.pending || [];
            const cats = data.categories || {};

            // Stats
            document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-number purple">${allCards.length}</div><div class="stat-label">Knowledge Cards</div></div>
        <div class="stat-card"><div class="stat-number blue">${Object.keys(cats).length}</div><div class="stat-label">Categories</div></div>
        <div class="stat-card"><div class="stat-number orange">${pendingCards.length}</div><div class="stat-label">Pending Review</div></div>
        <div class="stat-card"><div class="stat-number green">${allCards.length + pendingCards.length}</div><div class="stat-label">Total Items</div></div>
    `;

            // Category pills
            let pillsHtml = `<button class="pill active" onclick="filterCat(null, this)">All <span class="count">${allCards.length}</span></button>`;
            for (const [cat, cnt] of Object.entries(cats)) {
                pillsHtml += `<button class="pill" onclick="filterCat('${cat}', this)">${CAT_EMOJI[cat] || '📁'} ${cat} <span class="count">${cnt}</span></button>`;
            }
            if (pendingCards.length) {
                pillsHtml += `<button class="pill" onclick="filterCat('Pending', this)">⏳ Pending <span class="count">${pendingCards.length}</span></button>`;
            }
            document.getElementById('pills').innerHTML = pillsHtml;

            filtered = [...allCards];
            render();
        }

        function filterCat(cat, el) {
            activeCategory = cat;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            if (el) el.classList.add('active');
            perPage = 30;
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('search').value.toLowerCase().trim();

            if (activeCategory === 'Pending') {
                filtered = pendingCards.map(p => ({ ...p, content: p.answer || p.question, category: 'Pending' }));
            } else {
                filtered = allCards.filter(c => {
                    if (activeCategory && c.category !== activeCategory) return false;
                    return true;
                });
            }

            if (q) {
                filtered = filtered.filter(c =>
                    (c.title || '').toLowerCase().includes(q) ||
                    (c.content || '').toLowerCase().includes(q)
                );
            }

            document.getElementById('resultsInfo').textContent =
                (q || activeCategory) ? `Showing ${filtered.length} card${filtered.length !== 1 ? 's' : ''}` : '';

            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const toShow = filtered.slice(0, perPage);

            if (!toShow.length) {
                grid.innerHTML = '';
                document.getElementById('empty').style.display = 'block';
                document.getElementById('loadMore').style.display = 'none';
                return;
            }
            document.getElementById('empty').style.display = 'none';

            grid.innerHTML = toShow.map((c, i) => {
                const cat = c.category || 'General';
                const css = CAT_CSS[cat] || 'cat-general';
                const preview = esc((c.content || '').substring(0, 160));
                return `<div class="card" onclick="openCard(${i})" style="animation-delay:${Math.min(i * 30, 300)}ms">
            <span class="card-category ${css}">${CAT_EMOJI[cat] || '📁'} ${cat}</span>
            <div class="card-title">${esc(c.title)}</div>
            <div class="card-preview">${preview}...</div>
        </div>`;
            }).join('');

            document.getElementById('loadMore').style.display = filtered.length > perPage ? 'block' : 'none';
        }

        function showMore() { perPage += 30; render(); }

        function openCard(i) {
            const c = filtered[i];
            if (!c) return;
            const cat = c.category || 'General';
            const css = CAT_CSS[cat] || 'cat-general';
            document.getElementById('mCat').className = `modal-cat ${css}`;
            document.getElementById('mCat').textContent = `${CAT_EMOJI[cat] || ''} ${cat}`;
            document.getElementById('mTitle').textContent = c.title || 'Untitled';

            // Format content with proper paragraphs
            const raw = c.content || 'No content';
            const formatted = raw
                .split(/\n{2,}|(?<=\.)\s{2,}/)
                .filter(p => p.trim())
                .map(p => `<p>${esc(p.trim())}</p>`)
                .join('');
            document.getElementById('mBody').innerHTML = formatted || `<p>${esc(raw)}</p>`;

            let foot = '';
            if (c.slack_permalink) foot += `<a href="${c.slack_permalink}" target="_blank">View Slack Thread →</a>`;
            document.getElementById('mFoot').innerHTML = foot;
            document.getElementById('overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        // Events
        document.getElementById('close').onclick = closeModal;
        document.getElementById('overlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('search').focus(); }
        });

        let timer;
        document.getElementById('search').addEventListener('input', () => {
